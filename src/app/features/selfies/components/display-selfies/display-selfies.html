<h2>{{ title }}</h2>

@if (selfies.length == 0) {
  <p>Aucun selfie disponible</p>
} @else {
  <div>
    @for (selfie of selfies; track selfie.id) {
      <div>
        <img src="{{ selfie.path }}" alt="{{selfie.title}}" />
        <div style="display: flex; justify-content: space-between">
          <p>{{ selfie.title }}</p>
          <p>Post By: {{ selfie.wookie.name }}</p>
        </div>
        <p>{{ selfie.description }}</p>
      </div>
    }
  </div>
}
